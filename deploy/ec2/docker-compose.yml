services:
  covia-venue:
    image: ghcr.io/covia-ai/covia:latest
    container_name: covia-venue
    ports:
      - "8080:8080"
    volumes:
      - /home/ec2-user/covia-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
