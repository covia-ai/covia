name: Deploy to EC2

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build Convex dependency from develop branch
      run: |
        git clone --depth 1 --branch develop https://github.com/Convex-Dev/convex.git /tmp/convex
        cd /tmp/convex
        mvn install -DskipTests -q

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Get short SHA
      id: sha
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ghcr.io/covia-ai/covia:latest
          ghcr.io/covia-ai/covia:${{ steps.sha.outputs.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull latest image
          docker pull ghcr.io/covia-ai/covia:latest

          # Stop and remove existing container
          docker stop covia-venue 2>/dev/null || true
          docker rm covia-venue 2>/dev/null || true

          # Run new container
          docker run -d \
            --name covia-venue \
            -p 8080:8080 \
            -v /home/ec2-user/covia-data:/data \
            --restart unless-stopped \
            ghcr.io/covia-ai/covia:latest

          # Wait for health check
          sleep 10
          docker inspect --format='{{.State.Health.Status}}' covia-venue

          # Prune old images
          docker image prune -f
