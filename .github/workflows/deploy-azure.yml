name: Deploy to Azure

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build Convex dependency from develop branch
      run: |
        git clone --depth 1 --branch develop https://github.com/Convex-Dev/convex.git /tmp/convex
        cd /tmp/convex
        mvn install -DskipTests -q

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Get short SHA
      id: sha
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ghcr.io/covia-ai/covia:latest
          ghcr.io/covia-ai/covia:${{ steps.sha.outputs.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      packages: read

    steps:
    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v1
      env:
        GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        host: ${{ secrets.AZURE_VM_HOST }}
        username: ${{ secrets.AZURE_VM_USER }}
        key: ${{ secrets.AZURE_VM_SSH_KEY }}
        envs: GHCR_TOKEN
        script: |
          # Authenticate to GHCR
          echo $GHCR_TOKEN | docker login ghcr.io -u github --password-stdin

          # Pull latest image
          docker pull ghcr.io/covia-ai/covia:latest

          # Ensure config exists (venues array format)
          mkdir -p /home/azureuser/covia-data
          if [ ! -f /home/azureuser/covia-data/config.json ]; then
            cat > /home/azureuser/covia-data/config.json <<'CONF'
          {
            "venues": [
              {
                "name": "Covia Venue (Azure)",
                "hostname": "venue-4.covia.ai",
                "store": "/data/venue.etch",
                "mcp": {}
              }
            ]
          }
          CONF
          fi
          sudo chown -R 1001:1001 /home/azureuser/covia-data

          # Stop and remove existing container
          docker stop covia-venue 2>/dev/null || true
          docker rm covia-venue 2>/dev/null || true

          # Run new container
          docker run -d \
            --name covia-venue \
            -p 8080:8080 \
            -v /home/azureuser/covia-data:/data \
            --restart unless-stopped \
            ghcr.io/covia-ai/covia:latest \
            java -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -XX:+UseStringDeduplication -Djava.security.egd=file:/dev/./urandom -Dfile.encoding=UTF-8 -jar covia.jar /data/config.json

          # Wait for health check
          sleep 10
          docker inspect --format='{{.State.Health.Status}}' covia-venue

          # Prune old images
          docker image prune -f
