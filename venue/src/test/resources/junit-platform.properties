junit.jupiter.execution.parallel.enabled = true
# Run BOTH classes and methods in parallel. Single JVM, no surefire forks.
# AuthMiddleware was refactored from static fields to per-instance state
# (so multiple VenueServers in the same JVM no longer trample each other's
# public DIDs), and adapter tests use TestEngine.uniqueDID(testInfo) for
# per-test isolation, so concurrent test execution is now safe.
#
# A test that genuinely needs sequential method execution can opt out
# with @Execution(ExecutionMode.SAME_THREAD) at the class or method level.
junit.jupiter.execution.parallel.mode.classes.default = concurrent
junit.jupiter.execution.parallel.mode.default = concurrent
# Use all available cores (64 on this machine).
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 1.0